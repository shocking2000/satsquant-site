name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to gh-pages branch
        run: |
          mkdir /tmp/deploy
          cp index.html /tmp/deploy/
          cp .nojekyll /tmp/deploy/
          echo "satsquant.space" > /tmp/deploy/CNAME

          cd /tmp/deploy
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/shocking2000/satsquant-site.git" \
            HEAD:gh-pages
